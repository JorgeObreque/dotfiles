# Change the default Omarchy look'n'feel

# https://wiki.hypr.land/Configuring/Basics/Variables/#general
general {
    # No gaps between windows or borders
    # gaps_in = 0
    # gaps_out = 0
    # border_size = 0

    # Change to niri-like side-scrolling layout
    # layout = scrolling

    gaps_in = 4
    gaps_out = 8
    border_size = 1
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#decoration
decoration {
    # Use round window corners
    # rounding = 8

    # Dim unfocused windows (0.0 = no dim, 1.0 = fully dimmed)
    # dim_inactive = true
    # dim_strength = 0.15

    # Gundam theme - sharp corners, minimal cyan border
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
      enabled = false
    }
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#animations
animations {
    enabled = yes

    # Gundam theme - precise, sharp animations (mech-like snap)
    bezier = gundamSnap, 0, 0, 0.2, 1
    animation = global, 1, 1, gundamSnap
    animation = border, 1, 1, gundamSnap
    animation = fade, 1, 1, gundamSnap
    animation = windows, 1, 1, gundamSnap
    animation = windowsIn, 1, 1, gundamSnap
    animation = windowsOut, 1, 1, gundamSnap
    animation = workspaces, 1, 1, gundamSnap
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

# https://wiki.hypr.land/Configuring/Layouts/Scrolling-Layout/
scrolling {
    # See only one column per screen instead of two
    # column_width = 0.97
}
