source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 5
    brightness = 0.6
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 600, 80
    position = 0, -40
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 3

    font_family = JetBrainsMono Nerd Font
    font_size = 22
    font_color = $font_color

    placeholder_text = ENTER ACCESS CODE
    placeholder_color = rgba(0,212,255, 0.5)
    check_color = $check_color
    fail_color = $fail_color
    fail_text = <i>ACCESS DENIED ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
    placeholder_align = center
}

# Gundam HUD-style label above the password field
label {
    monitor =
    text = GUNDAM OS — AUTHENTICATION REQUIRED
    font_family = JetBrainsMono Nerd Font
    font_size = 14
    color = rgba(0,212,255, 0.9)
    position = 0, -150
    halign = center
    valign = center
    shadow_passes = 0
}

label {
    monitor =
    text = $TIME
    font_family = JetBrainsMono Nerd Font
    font_size = 80
    color = rgba(0,212,255, 1.0)
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 0
}

auth {
    fingerprint:enabled = false
}
